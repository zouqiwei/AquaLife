name: AquaLife
options:
  bundleIdPrefix: com.zouqiwei
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "432G2Q5Q3E"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  AquaLife:
    type: application
    platform: iOS
    sources:
      - path: AquaLife
        excludes:
          - "**/.DS_Store"
    info:
      path: AquaLife/Info.plist
      properties:
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSHealthShareUsageDescription: "AquaLife 需要读取您的健康数据（步数、睡眠、心率），用于展示今日健康概览。"
        NSHealthUpdateUsageDescription: "AquaLife 需要写入饮水数据到健康 App，以便统一管理您的饮水记录。"
        UIBackgroundModes:
          - background-processing
    settings:
      base:
        INFOPLIST_FILE: AquaLife/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.zouqiwei.AquaLife
    entitlements:
      path: AquaLife/AquaLife.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records

  AquaLifeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AquaLifeTests
    dependencies:
      - target: AquaLife
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zouqiwei.AquaLifeTests
